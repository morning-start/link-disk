# link-disk 配置文件示例
# 复制此文件到 ~/.link-disk/config.toml 并根据需要修改

[workspace]
path = "D:/link-disk-workspace"

# ============ VSCode ============
[apps.vscode]
name = "VSCode"
on_exists = "skip"

[[apps.vscode.sources]]
source = "<home>/AppData/Roaming/Code"
target = "vscode/Roaming"
link_type = "symlink"

[[apps.vscode.sources]]
source = "<home>/.vscode"
target = "vscode/config"
link_type = "symlink"

# ============ Chrome ============
[apps.chrome]
name = "Chrome"
on_exists = "skip"

[[apps.chrome.sources]]
source = "<home>/AppData/Local/Google/Chrome"
target = "chrome/Local"
link_type = "symlink"

[[apps.chrome.sources]]
source = "<home>/AppData/Roaming/Google/Chrome"
target = "chrome/Roaming"
link_type = "symlink"
