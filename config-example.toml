# link-disk 配置文件示例
# 复制此文件到 ~/.link-disk/config.toml 并根据需要修改

[workspace]
path = "D:/link-disk-workspace"

[apps.vscode]
name = "VSCode"
enabled = true
on_exists = "skip"

[[apps.vscode.sources]]
source = "<home>/AppData/Roaming/Code"
target = "Roaming"
link_type = "symlink"
_source_type = "dir"

[[apps.vscode.sources]]
source = "<home>/.vscode"
target = "config"
link_type = "symlink"
_source_type = "dir"

[apps.chrome]
name = "Chrome"
enabled = true
on_exists = "skip"

[[apps.chrome.sources]]
source = "<home>/AppData/Local/Google/Chrome"
target = "Local"
link_type = "symlink"
_source_type = "dir"
